  <defs>
    <!-- Fade the grid out toward the horizon (top) so it recedes. -->
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="white" stop-opacity="0"/>
      <stop offset="0.55" stop-color="white" stop-opacity="0.5"/>
      <stop offset="1" stop-color="white" stop-opacity="1"/>
    </linearGradient>
    <mask id="fadeMask"><rect width="1000" height="500" fill="url(#fade)"/></mask>
  </defs>
  <g mask="url(#fadeMask)" stroke="#ff5aa0" stroke-width="1.25" fill="none" opacity="0.22">

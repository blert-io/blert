name: Test 2 Challenge 2 Server

on:
  pull_request:
    paths:
      - 'challenge-harder/**'
      - 'common/migrations/**'
      - 'proto/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/test-challenge-harder.yml'
  push:
    branches:
      - main
    paths:
      - 'challenge-harder/**'
      - 'common/migrations/**'
      - 'proto/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/test-challenge-harder.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis
        ports:
          - 6379:6379

      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: blert
          POSTGRES_PASSWORD: blert
          POSTGRES_DB: blert_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24.8.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_fetch_retries: 5
          npm_config_fetch_retry_mintimeout: 20000
          npm_config_fetch_retry_maxtimeout: 120000

      - name: Build common
        run: npm run -w common build

      - name: Run database migrations
        run: npm run -w common migration:run
        env:
          BLERT_DATABASE_URI: postgres://blert:blert@localhost:5432/blert_test

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt -p challenge-harder -- --check

      - name: Lint
        run: cargo clippy -p challenge-harder -- -D warnings

      - name: Build
        run: cargo build -p challenge-harder

      - name: Run tests
        run: cargo test -p challenge-harder
        env:
          # Set dedicated databases for tests.
          BLERT_TEST_REDIS_URI: redis://localhost:6379/15
          BLERT_TEST_DATABASE_URI: postgres://blert:blert@localhost:5432/blert_test

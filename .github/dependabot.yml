version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        # Formatting and lint tooling is excluded from the group because a
        # bump usually requires a matching reformat or relint, which does not
        # belong in a PR carrying dozens of unrelated packages. Excluded
        # packages still receive their own individual update PRs.
        exclude-patterns:
          - prettier
          - eslint
          - '@eslint/*'
          - typescript-eslint
          - '@typescript-eslint/*'
        update-types:
          - minor
          - patch

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - '*'
